<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Flight Sim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
    #scene { width: 100%; height: 100%; }
    
    #hud {
      position: fixed; top: 12px; left: 12px; right: 12px;
      display: flex; justify-content: space-between;
      font-family: 'Courier New', monospace; font-size: 14px; color: #0f0;
      text-shadow: 0 0 4px #0f0; pointer-events: none; z-index: 10;
    }
    .hud-box { background: rgba(0,20,0,0.6); padding: 8px 12px; border: 1px solid #0f0; border-radius: 4px; }
    .hud-label { font-size: 10px; color: #0a0; }
    .hud-value { font-size: 18px; font-weight: bold; }
    
    #controls-hint {
      position: fixed; bottom: 12px; left: 12px;
      font-family: 'Courier New', monospace; font-size: 11px; color: #0f0;
      background: rgba(0,20,0,0.6); padding: 8px; border: 1px solid #0f0; border-radius: 4px;
      pointer-events: none; z-index: 10;
    }
    
    #menu {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; font-family: 'Courier New', monospace;
    }
    #menu h1 { color: #0f0; font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 10px #0f0; }
    #menu button {
      background: #030; color: #0f0; border: 2px solid #0f0;
      padding: 15px 40px; font-size: 18px; cursor: pointer;
      font-family: inherit; margin: 10px;
      transition: all 0.2s;
    }
    #menu button:hover { background: #0f0; color: #000; }
    
    .stick {
      position: fixed; bottom: 20px; width: 120px; height: 120px;
      border: 2px solid #0f0; border-radius: 50%;
      background: rgba(0,40,0,0.4); display: none; z-index: 50;
    }
    .stick .nub {
      position: absolute; width: 40px; height: 40px;
      background: #0f0; border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    #left-stick { left: 20px; }
    #right-stick { right: 20px; }
    
    @media (max-width: 800px) {
      .stick { display: block; }
      #controls-hint { display: none; }
    }
  </style>
</head>
<body>
  <div id="scene"></div>
  
  <div id="hud">
    <div class="hud-box"><div class="hud-label">SPEED</div><div class="hud-value" id="spd">0</div><div class="hud-label">KT</div></div>
    <div class="hud-box"><div class="hud-label">ALT</div><div class="hud-value" id="alt">0</div><div class="hud-label">FT</div></div>
    <div class="hud-box"><div class="hud-label">HEADING</div><div class="hud-value" id="hdg">0</div><div class="hud-label">°</div></div>
    <div class="hud-box"><div class="hud-label">THROTTLE</div><div class="hud-value" id="thr">0</div><div class="hud-label">%</div></div>
  </div>
  
  <div id="controls-hint">
    <b>Desktop:</b> W/S=Pitch, A/D=Roll, Q/E=Yaw, Shift/Ctrl=Throttle<br>
    <b>Mobile:</b> Left stick=Pitch/Roll, Right stick=Yaw
  </div>
  
  <div id="menu">
    <h1>✈️ FLIGHT SIM</h1>
    <button id="startBtn">START ENGINE</button>
  </div>
  
  <div id="left-stick" class="stick"><div class="nub"></div></div>
  <div id="right-stick" class="stick"><div class="nub"></div></div>

  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.161.0/build/three.module.js" } }
  </script>
  <script type="module">
    import * as THREE from 'three';

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 100, 5000);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 20000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('scene').appendChild(renderer.domElement);

    // Lights
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(100, 200, 50);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x6688cc, 0.5));

    // Ground - large flat plane with some texture
    const groundGeo = new THREE.PlaneGeometry(40000, 40000, 100, 100);
    const positions = groundGeo.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
      positions[i + 2] += Math.random() * 8 - 4; // slight hills
    }
    groundGeo.computeVertexNormals();
    const groundMat = new THREE.MeshStandardMaterial({ 
      color: 0x3a5f0b, 
      roughness: 0.9,
      flatShading: true
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Runway
    const runwayGeo = new THREE.PlaneGeometry(60, 2000);
    const runwayMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
    const runway = new THREE.Mesh(runwayGeo, runwayMat);
    runway.rotation.x = -Math.PI / 2;
    runway.position.set(0, 0.1, 0);
    scene.add(runway);

    // Runway markings
    for (let i = 0; i < 20; i++) {
      const mark = new THREE.Mesh(
        new THREE.PlaneGeometry(3, 30),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      mark.rotation.x = -Math.PI / 2;
      mark.position.set(0, 0.15, -900 + i * 90);
      scene.add(mark);
    }

    // Simple aircraft
    const aircraft = new THREE.Group();
    
    // Fuselage
    const fuselage = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.8, 6, 8, 16),
      new THREE.MeshStandardMaterial({ color: 0xf0f0f0, metalness: 0.4, roughness: 0.5 })
    );
    fuselage.rotation.z = Math.PI / 2;
    aircraft.add(fuselage);

    // Wings
    const wing = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.15, 12),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.3, roughness: 0.6 })
    );
    wing.position.set(-0.3, 0, 0);
    aircraft.add(wing);

    // Tail
    const tailH = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 0.1, 4),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.3, roughness: 0.6 })
    );
    tailH.position.set(-3.2, 0, 0);
    aircraft.add(tailH);

    const tailV = new THREE.Mesh(
      new THREE.BoxGeometry(0.8, 1.5, 0.1),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.3, roughness: 0.6 })
    );
    tailV.position.set(-3, 0.8, 0);
    aircraft.add(tailV);

    // Cockpit
    const cockpit = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2),
      new THREE.MeshStandardMaterial({ color: 0x2244aa, metalness: 0.8, roughness: 0.1, transparent: true, opacity: 0.7 })
    );
    cockpit.rotation.x = Math.PI / 2;
    cockpit.rotation.z = -Math.PI / 6;
    cockpit.position.set(2, 0.5, 0);
    aircraft.add(cockpit);

    // Propeller
    const prop = new THREE.Mesh(
      new THREE.BoxGeometry(0.1, 2.5, 0.2),
      new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    prop.position.set(3.5, 0, 0);
    aircraft.add(prop);

    aircraft.position.set(0, 2, 600);
    scene.add(aircraft);

    // Flight state
    const flight = {
      pos: new THREE.Vector3(0, 2, 600),
      vel: new THREE.Vector3(0, 0, 0),
      rot: new THREE.Euler(0, 0, 0, 'YXZ'),
      throttle: 0,
      speed: 0,
      onGround: true
    };

    // Controls
    const controls = { pitch: 0, roll: 0, yaw: 0 };
    const keys = {};

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Touch joysticks
    function setupStick(id, onMove) {
      const stick = document.getElementById(id);
      const nub = stick.querySelector('.nub');
      let active = false, startX, startY;

      stick.addEventListener('touchstart', e => {
        active = true;
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
      });

      stick.addEventListener('touchmove', e => {
        if (!active) return;
        e.preventDefault();
        const dx = (e.touches[0].clientX - startX) / 60;
        const dy = (e.touches[0].clientY - startY) / 60;
        const dist = Math.min(1, Math.hypot(dx, dy));
        const ang = Math.atan2(dy, dx);
        const x = Math.cos(ang) * dist;
        const y = Math.sin(ang) * dist;
        nub.style.transform = `translate(calc(-50% + ${x * 35}px), calc(-50% + ${y * 35}px))`;
        onMove(x, -y);
      });

      stick.addEventListener('touchend', () => {
        active = false;
        nub.style.transform = 'translate(-50%, -50%)';
        onMove(0, 0);
      });
    }

    setupStick('left-stick', (x, y) => { controls.roll = x; controls.pitch = y; });
    setupStick('right-stick', (x, y) => { controls.yaw = x; });

    // Menu
    let running = false;
    document.getElementById('startBtn').addEventListener('click', () => {
      document.getElementById('menu').style.display = 'none';
      running = true;
      flight.throttle = 30;
    });

    // Physics
    function updatePhysics(dt) {
      if (!running) return;

      // Keyboard controls
      if (keys['KeyW']) controls.pitch = 1;
      else if (keys['KeyS']) controls.pitch = -1;
      else if (!document.getElementById('left-stick').matches(':active')) controls.pitch = 0;

      if (keys['KeyA']) controls.roll = -1;
      else if (keys['KeyD']) controls.roll = 1;
      else if (!document.getElementById('left-stick').matches(':active')) controls.roll = 0;

      if (keys['KeyQ']) controls.yaw = -1;
      else if (keys['KeyE']) controls.yaw = 1;
      else if (!document.getElementById('right-stick').matches(':active')) controls.yaw = 0;

      if (keys['ShiftLeft'] || keys['ShiftRight']) flight.throttle = Math.min(100, flight.throttle + 50 * dt);
      if (keys['ControlLeft'] || keys['ControlRight']) flight.throttle = Math.max(0, flight.throttle - 50 * dt);

      // Throttle to speed
      const thrust = flight.throttle * 0.5;
      const maxSpeed = 150;

      // Apply rotation
      flight.rot.x += controls.pitch * 1.2 * dt;
      flight.rot.z -= controls.roll * 1.5 * dt;
      flight.rot.y += controls.yaw * 0.8 * dt;

      // Clamp
      flight.rot.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, flight.rot.x));
      flight.rot.z = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, flight.rot.z));

      // Damping
      flight.rot.z *= 0.98;
      flight.rot.y *= 0.99;

      // Get direction
      const dir = new THREE.Vector3(1, 0, 0);
      dir.applyEuler(flight.rot);

      // Speed
      const targetSpeed = (thrust / 100) * maxSpeed;
      flight.speed += (targetSpeed - flight.speed) * dt * 0.5;
      flight.speed = Math.max(0, flight.speed);

      // Lift
      const lift = flight.speed * 0.04 * Math.sin(flight.rot.x + 0.1);
      const gravity = 9.8;

      // Ground check
      if (flight.pos.y < 0.5) {
        flight.pos.y = 0.5;
        flight.rot.x = 0;
        if (flight.speed < 20) {
          flight.speed *= 0.98;
        }
      }

      // Apply velocity
      flight.vel.set(dir.x * flight.speed, lift - gravity * 0.1, -dir.z * flight.speed);
      flight.pos.add(flight.vel.clone().multiplyScalar(dt));

      // Update mesh
      aircraft.position.copy(flight.pos);
      aircraft.rotation.set(flight.rot.x, -flight.rot.y, flight.rot.z);

      // Prop spin
      prop.rotation.x += flight.speed * 0.5;

      // Camera follow
      const camOffset = new THREE.Vector3(-15, 5, 0);
      camOffset.applyEuler(flight.rot);
      camera.position.lerp(flight.pos.clone().add(camOffset), 0.05);
      camera.lookAt(flight.pos);

      // HUD
      document.getElementById('spd').textContent = Math.round(flight.speed);
      document.getElementById('alt').textContent = Math.round(flight.pos.y * 3.28);
      document.getElementById('hdg').textContent = Math.round(((flight.rot.y * 180 / Math.PI) + 360) % 360);
      document.getElementById('thr').textContent = Math.round(flight.throttle);
    }

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      updatePhysics(clock.getDelta());
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
