<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flight Simulator - A380</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100vw !important; height: 100vh !important; 
      overflow: hidden !important; background: #000; font-family: monospace;
    }
    #cesium-container { 
      width: 100vw !important; height: 100vh !important; 
      position: fixed !important; top: 0 !important; left: 0 !important;
    }
    .cesium-viewer, .cesium-widget, canvas { width: 100vw !important; height: 100vh !important; }
    .loading {
      position: fixed; top: 0; left: 0; right: 0; bottom:0;
      background: linear-gradient(135deg,#0a0a0a,#1a1a2e);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; color: #00ff88; font-size: 20px;
    }
    .loading.hidden { display: none; }
    .hud {
      position: fixed; top: 20px; left: 20px;
      background: rgba(0,0,0,0.85); color: #00ff88; padding: 15px;
      border-radius: 8px; z-index: 100; min-width: 200px;
    }
    .hud div { margin: 4px 0; display: flex; justify-content: space-between; }
    .hud span { color: #fff; }
    .controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #888; padding: 10px 20px;
      border-radius: 20px; z-index: 100; font-size: 12px;
    }
    .pfd {
      position: fixed; bottom: 20px; right: 20px;
      width: 180px; height: 180px;
      background: rgba(0,20,0,0.9); border: 2px solid #00ff88; border-radius: 50%;
      z-index: 100;
    }
    .pfd canvas { width: 100%; height: 100%; border-radius: 50%; }
    .touch-left, .touch-right {
      position: fixed; bottom: 30px; width: 120px; height: 120px;
      background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
      z-index: 200; display: none;
    }
    .touch-left { left: 30px; }
    .touch-right { right: 30px; }
    .touch-knob {
      position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
      background: rgba(0,255,0,0.5); border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    @media (pointer: coarse) {
      .hud { top: 20px; left: 20px; right: auto; font-size: 12px; padding: 10px; min-width: 150px; }
      .pfd { top: 20px; right: 20px; bottom: auto; width: 100px !important; height: 100px !important; }
      .pfd canvas { width: 100px !important; height: 100px !important; }
      .touch-left, .touch-right { display: block; width: 100px; height: 100px; }
      .touch-left { bottom: 30px; left: 20px; }
      .touch-right { bottom: 30px; right: 20px; }
      .touch-knob { width: 40px; height: 40px; }
      .controls { display: none; }
    }
    @media (pointer: fine) {
      .pfd { bottom: 20px; right: 20px; }
      .hud { top: 20px; left: 20px; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">Flight Sim - Loading...</div>
  <div id="cesium-container"></div>
  
  <div class="hud">
    <div>FPS: <span id="fps">--</span></div>
    <div>POS: <span id="pos">--</span></div>
    <div>HDG: <span id="hdg">--</span>°</div>
    <div>ALT: <span id="alt">--</span></div>
    <div>SPD: <span id="spd">--</span></div>
    <div>V/S: <span id="vs">--</span></div>
    <div>THR: <span id="thr">--</span>%</div>
    <div style="color:#888;margin-top:8px">MODE: <span id="mode">KEY</span></div>
  </div>
  
  <div class="pfd"><canvas id="pfd-canvas" width="180" height="180"></canvas></div>
  
  <div class="touch-left" id="touch-left"><div class="touch-knob" id="knob-left"></div></div>
  <div class="touch-right" id="touch-right"><div class="touch-knob" id="knob-right"></div></div>
  
  <div class="controls">W/S=Thr | A/D=Roll | Arrows=Pitch/Turn | Q/E=Throttle</div>

  <script>
    const CESIUM_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJmZTVkZWJkZC1lMDdlLTQyYzMtYWIyNS01YmUzZTc4Y2JmMGIiLCJpZCI6MzkyOTEzLCJpYXQiOjE3NzE3MzAzNjh9.lNWe3qqelAGSjQAMwJv8jrHbdxKFmFYq7UB80y4O6CU';
    
    // A380 realistic parameters
    const A380 = {
      mass: 276800,           // kg MTOW
      wingArea: 845,          // m²
      maxThrust: 1424000,     // 4x 356kN
      maxRollRate: 14,        // deg/s - realistic A380 roll rate
      maxPitchRate: 4.5,      // deg/s - realistic A380 pitch rate
      maxBank: 35,            // degrees max bank
      maxPitch: 20,           // degrees max pitch
      stallSpeed: 70          // m/s
    };
    
    // Flight state
    const state = { 
      lon: 103.9915, lat: 1.3644, alt: 500, heading: 90, pitch: 0, roll: 0, 
      speed: 150, throttle: 0.5, verticalSpeed: 0 
    };
    
    // Smoothed controls (with lag for realistic feel)
    const controls = { aileron: 0, elevator: 0, targetAileron: 0, targetElevator: 0 };
    const CONTROL_LAG = 3.0; // seconds to reach full deflection
    
    const keys = {};
    let controlMode = 'KEY';
    
    // Input handlers
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'KeyQ') state.throttle = Math.min(1, state.throttle + 0.02);
      if (e.code === 'KeyE') state.throttle = Math.max(0, state.throttle - 0.02);
    });
    document.addEventListener('keyup', e => keys[e.code] = false);
    
    // Gamepad
    window.addEventListener('gamepadconnected', () => controlMode = 'GAMEPAD');
    window.addEventListener('gamepaddisconnected', () => controlMode = 'KEY');
    
    // Touch controls
    const touchState = { left: {x:0,y:0}, right: {x:0,y:0} };
    function setupTouch() {
      const left = document.getElementById('touch-left'), right = document.getElementById('touch-right');
      const kLeft = document.getElementById('knob-left'), kRight = document.getElementById('knob-right');
      let leftId, rightId;
      
      left.addEventListener('touchstart', e => { leftId = e.changedTouches[0].identifier; controlMode = 'TOUCH'; });
      left.addEventListener('touchmove', e => {
        for (let t of e.changedTouches) if (t.identifier === leftId) {
          const r = left.getBoundingClientRect();
          touchState.left.x = Math.max(-1, Math.min(1, (t.clientX - r.left - 60) / 40));
          touchState.left.y = Math.max(-1, Math.min(1, (t.clientY - r.top - 60) / 40));
          kLeft.style.transform = 'translate(calc(-50% + ' + (touchState.left.x*25) + 'px), calc(-50% + ' + (touchState.left.y*25) + 'px))';
        }
      });
      left.addEventListener('touchend', e => { for (let t of e.changedTouches) if (t.identifier === leftId) { touchState.left = {x:0,y:0}; kLeft.style.transform = 'translate(-50%,-50%)'; } });
      
      right.addEventListener('touchstart', e => { rightId = e.changedTouches[0].identifier; controlMode = 'TOUCH'; });
      right.addEventListener('touchmove', e => {
        for (let t of e.changedTouches) if (t.identifier === rightId) {
          const r = right.getBoundingClientRect();
          touchState.right.x = Math.max(-1, Math.min(1, (t.clientX - r.left - 60) / 40));
          touchState.right.y = Math.max(-1, Math.min(1, (t.clientY - r.top - 60) / 40));
          kRight.style.transform = 'translate(calc(-50% + ' + (touchState.right.x*25) + 'px), calc(-50% + ' + (touchState.right.y*25) + 'px))';
        }
      });
      right.addEventListener('touchend', e => { for (let t of e.changedTouches) if (t.identifier === rightId) { touchState.right = {x:0,y:0}; kRight.style.transform = 'translate(-50%,-50%)'; } });
    }
    setupTouch();
    
    // FPS
    let frameCount = 0, lastFpsTime = performance.now();
    
    // Physics
    function update(dt) {
      // Get control inputs
      controls.targetAileron = 0;
      controls.targetElevator = 0;
      
      // Aileron (roll) - A/D or Left/Right
      if (keys['KeyA'] || keys['ArrowLeft']) controls.targetAileron = -1;
      if (keys['KeyD'] || keys['ArrowRight']) controls.targetAileron = 1;
      
      // Elevator (pitch) - W/S or Up/Down
      if (keys['KeyW'] || keys['ArrowUp']) controls.targetElevator = -1;
      if (keys['KeyS'] || keys['ArrowDown']) controls.targetElevator = 1;
      
      // Smooth control inputs (first-order lag for realism)
      const smoothing = 1 - Math.exp(-dt * CONTROL_LAG);
      controls.aileron += (controls.targetAileron - controls.aileron) * smoothing;
      controls.elevator += (controls.targetElevator - controls.elevator) * smoothing;
      
      // Control effectiveness scales with airspeed
      const speedFactor = Math.min(1, Math.max(0.1, (state.speed - A380.stallSpeed) / 100));
      
      // Roll rate: ~14°/s max, scales with speed
      const rollRate = controls.aileron * A380.maxRollRate * speedFactor;
      state.roll += rollRate * dt * Math.PI / 180;
      state.roll = Math.max(-A380.maxBank * Math.PI / 180, Math.min(A380.maxBank * Math.PI / 180, state.roll));
      
      // Pitch rate: ~4.5°/s max
      const pitchRate = controls.elevator * A380.maxPitchRate * speedFactor;
      state.pitch += pitchRate * dt * Math.PI / 180;
      state.pitch = Math.max(-A380.maxPitch * Math.PI / 180, Math.min(A380.maxPitch * Math.PI / 180, state.pitch));
      
      // Coordinated turn: turn rate = g * tan(bank) / airspeed
      if (state.speed > A380.stallSpeed) {
        const bankAngle = state.roll;
        const turnRateFromBank = (9.81 * Math.tan(bankAngle)) / state.speed;
        state.heading += turnRateFromBank * 180 / Math.PI * dt;
      }
      
      // Thrust affects speed
      const thrust = state.throttle * A380.maxThrust;
      const drag = 0.015 * state.speed * state.speed;
      const acceleration = (thrust - drag) / A380.mass;
      state.speed += acceleration * dt;
      state.speed = Math.max(A380.stallSpeed / 2, Math.min(350, state.speed));
      
      // Vertical speed from pitch
      const verticalFromPitch = state.speed * Math.sin(state.pitch);
      const verticalFromThrust = (state.throttle - 0.5) * 30;
      state.verticalSpeed = verticalFromPitch + verticalFromThrust;
      state.alt += state.verticalSpeed * dt;
      state.alt = Math.max(50, state.alt);
      
      // Movement
      const headingRad = state.heading * Math.PI / 180;
      const groundSpeed = state.speed * Math.cos(state.pitch);
      const speedDeg = groundSpeed / 111320;
      
      state.lon += Math.sin(headingRad) * speedDeg * dt;
      state.lat += Math.cos(headingRad) * speedDeg * dt;
      
      // HUD
      document.getElementById('pos').textContent = state.lon.toFixed(4) + ',' + state.lat.toFixed(4) + ',' + state.alt.toFixed(0) + 'm';
      document.getElementById('hdg').textContent = ((state.heading % 360 + 360) % 360).toFixed(0) + '°';
      document.getElementById('spd').textContent = state.speed.toFixed(0) + ' m/s';
      document.getElementById('alt').textContent = state.alt.toFixed(0) + ' m';
      document.getElementById('vs').textContent = (state.verticalSpeed > 0 ? '+' : '') + state.verticalSpeed.toFixed(0) + ' m/s';
      document.getElementById('thr').textContent = (state.throttle * 100).toFixed(0);
      document.getElementById('mode').textContent = controlMode;
      
      frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        document.getElementById('fps').textContent = frameCount;
        frameCount = 0; lastFpsTime = now;
      }
    }
    
    // PFD
    function drawPFD() {
      const c = document.getElementById('pfd-canvas');
      const ctx = c.getContext('2d');
      const w = 180, h = 180, cx = w/2, cy = h/2;
      
      ctx.fillStyle = '#001a00';
      ctx.fillRect(0,0,w,h);
      
      const pitchScale = 3;
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 1;
      
      for (let p = -90; p <= 90; p += 10) {
        const y = cy - (state.pitch * 180 / Math.PI - p) * pitchScale;
        if (y > 10 && y < h-10) {
          const lw = p === 0 ? 50 : p % 30 === 0 ? 35 : 20;
          ctx.beginPath(); ctx.moveTo(cx-lw,y); ctx.lineTo(cx+lw,y); ctx.stroke();
        }
      }
      
      // Roll
      ctx.save(); ctx.translate(cx,25); ctx.rotate(-state.roll);
      ctx.fillStyle = '#00ff88'; ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(-10,-12); ctx.lineTo(10,-12); ctx.closePath(); ctx.fill();
      ctx.restore();
      
      // Center
      ctx.fillStyle = '#ff0';
      ctx.beginPath(); ctx.moveTo(cx-15,cy); ctx.lineTo(cx+15,cy); ctx.lineTo(cx,cy-10); ctx.lineTo(cx,cy+10); ctx.fill();
      
      // Heading
      ctx.fillStyle = '#00ff88';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(((state.heading % 360 + 360) % 360).toFixed(0) + '°', cx, h-10);
    }
    
    async function init() {
      Cesium.Ion.defaultAccessToken = CESIUM_TOKEN;
      document.body.style.margin = '0';
      
      const viewer = new Cesium.Viewer('cesium-container', {
        terrainProvider: await Cesium.createWorldTerrainAsync(),
        baseLayerPicker: false, geocoder: false, homeButton: false,
        sceneModePicker: false, selectionIndicator: false, timeline: false,
        animation: false, navigationHelpButton: false, fullscreenButton: false,
        infoBox: false, shouldAnimate: false
      });
      
      const aircraft = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt),
        model: { uri: 'https://cesium.com/public/Sandcastle/SampleData/models/CesiumAir/Cesium_Air.glb', scale: 50 },
        label: { text: '✈️ A380', font: '24px sans-serif', fillColor: Cesium.Color.YELLOW, pixelOffset: new Cesium.Cartesian2(0,-60) },
        point: { pixelSize: 15, color: Cesium.Color.RED }
      });
      
      viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(103.9915, 1.3644, 0),
        point: { pixelSize: 12, color: Cesium.Color.CYAN },
        label: { text: '🛫 Singapore', font: '16px sans-serif' }
      });
      
      document.getElementById('loading').classList.add('hidden');
      
      let last = performance.now();
      function loop() {
        const now = performance.now();
        const dt = Math.min((now - last) / 1000, 0.1);
        last = now;
        
        update(dt);
        
        aircraft.position = Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt);
        aircraft.orientation = Cesium.Transforms.headingPitchRollQuaternion(
          Cesium.Cartesian3.fromDegrees(state.lon, state.lat, state.alt),
          new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(state.heading), state.pitch, state.roll)
        );
        
        const h = state.heading * Math.PI/180;
        viewer.camera.setView({
          destination: Cesium.Cartesian3.fromDegrees(state.lon - Math.sin(h)*0.02, state.lat - Math.cos(h)*0.02, state.alt + 300),
          orientation: { heading: Cesium.Math.toRadians(state.heading), pitch: Cesium.Math.toRadians(-15 + state.pitch * 30), roll: state.roll * 0.5 }
        });
        
        drawPFD();
        requestAnimationFrame(loop);
      }
      loop();
    }
    
    init();
  </script>
</body>
</html>
